<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Заказы</title>
</head>
<body>
    <div class="page">
        <h1>Мои заказы</h1>

        <div class="page-actions">
            <button onclick="location.href='create.html'">Создать заказ</button>
            <button class="btn-red" onclick="logout()">Выйти</button>
        </div>

        <div id="ordersContainer">
            <!-- Заказы будут загружены сюда -->
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('session'));
        if (!session || !session.loggedIn) location.href = 'login.html';

        function logout() { localStorage.removeItem('session'); location.href = 'login.html'; }

        function loadOrders() {
            const orders = JSON.parse(localStorage.getItem('orders')) || [];
            const container = document.getElementById('ordersContainer');
            if (!orders.length) { container.innerHTML = '<p>Заказов нет</p>'; return; }
            container.innerHTML = orders.map(o => `
                <div class="order">
                    <p><b>Заказ #${o.id}</b></p>
                    <p>Тип: ${o.type} | Дата: ${o.date}</p>
                    ${o.phone ? `<p>Телефон: ${o.phone}</p>` : ''}
                    <p>Оплата: ${o.payment} | Статус: ${o.status}</p>
                </div>
            `).join('');
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
