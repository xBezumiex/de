<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Админ</title>
</head>
<body>
    <div class="page">
        <h1>Админ-панель</h1>

        <div class="page-actions">
            <button class="btn-red" onclick="logout()">Выйти</button>
        </div>

        <div class="table-wrap">
            <table>
                <tr>
                    <th>Заказ</th>
                    <th>Пользователь</th>
                    <th>Тип</th>
                    <th>Дата</th>
                    <th>Статус</th>
                </tr>
                <tr>
                    <td>#1</td>
                    <td>user1</td>
                    <td>Тип 1</td>
                    <td>15.12.2024</td>
                    <td>
                        <select>
                            <option>Новый</option>
                            <option>В работе</option>
                            <option>Готово</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>#2</td>
                    <td>user2</td>
                    <td>Тип 2</td>
                    <td>20.12.2024</td>
                    <td>
                        <select>
                            <option>Новый</option>
                            <option>В работе</option>
                            <option>Готово</option>
                        </select>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('session'));
        if (!session || !session.loggedIn || session.role !== 'admin') location.href = 'login.html';

        function logout() {
            localStorage.removeItem('session');
            location.href = 'login.html';
        }
    </script>
</body>
</html>
