<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Админ</title>
</head>
<body>
    <div class="page">
        <h1>Админ-панель</h1>

        <div class="page-actions">
            <button class="btn-red" onclick="logout()">Выйти</button>
        </div>

        <div class="table-wrap">
            <table id="ordersTable">
                <tr>
                    <th>Заказ</th >
                    <th>Пользователь</th>
                    <th>Тип</th>
                    <th>Дата</th>
                    <th>Статус</th>
                </tr>
            </table>
        </div>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('session'));
        if (!session || !session.loggedIn || session.role !== 'admin') location.href = 'login.html';

        const load = k => JSON.parse(localStorage.getItem(k)) || [];
        const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

        function logout() { localStorage.removeItem('session'); location.href = 'login.html'; }

        function loadOrders() {
            const orders = load('orders');
            const table = document.getElementById('ordersTable');
            if (!orders.length) { table.innerHTML += '<tr><td colspan="5">Заказов нет</td></tr>'; return; }
            table.innerHTML += orders.map((o, i) => `
                <tr>
                    <td>#${i+1}</td><td>${o.user || '—'}</td><td>${o.type}</td><td>${o.date}</td>
                    <td><select onchange="updateStatus(${i},this.value)">
                        ${['Новый','В работе','Готово'].map(s => `<option${s===o.status?' selected':''}>${s}</option>`).join('')}
                    </select></td>
                </tr>
            `).join('');
        }

        function updateStatus(i, status) {
            const orders = load('orders');
            orders[i].status = status;
            save('orders', orders);
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
