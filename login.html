<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Вход</title>
</head>
<body>
    <div class="card">
        <h1>Вход</h1>
        <form onsubmit="check(event)">
            <p>Логин</p>
            <input type="text" id="login" required>

            <p>Пароль</p>
            <input type="password" id="pass" required>

            <p id="error" style="color:#e94560; display:none;"></p>

            <button type="submit">Войти</button>
        </form>
        <div class="links">
            <a href="register.html">Регистрация</a>
            <a href="index.html">Перейти на главную</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function check(e) {
            e.preventDefault();
            const login = g('login'), pass = g('pass');
            if (login === 'admin' && pass === 'admin') {
                save('session', { loggedIn: true, role: 'admin', login: 'admin' });
                return location.href = 'admin.html';
            }
            const user = load('users').find(u => u.login === login && u.pass === pass);
            if (user) { save('session', { loggedIn: true, role: 'user', login: user.login }); location.href = 'orders.html'; }
            else err('Неверный логин или пароль');
        }
    </script>
</body>
</html>
