<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Регистрация</title>
</head>
<body>
    <div class="card">
        <h1>Регистрация</h1>
        <form onsubmit="register(event)">
            <p>Логин</p>
            <input type="text" id="login" required>

            <p>Пароль</p>
            <input type="password" id="pass" required minlength="6">

            <p>ФИО</p>
            <input type="text" id="name" required>

            <p>Телефон</p>
            <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" required
                pattern="(\+7|8)[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}">

            <p>Email</p>
            <input type="email" id="email" required>

            <p id="error" style="color:#e94560; display:none;"></p>

            <button type="submit">Создать аккаунт</button>
        </form>
        <div class="links">
            <a href="login.html">Уже есть аккаунт</a>
            <a href="index.html">Перейти на главную</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function register(e) {
            e.preventDefault();
            const login = g('login'), pass = g('pass'), name = g('name'), phone = g('phone'), email = g('email');
            const users = load('users');
            if (users.find(u => u.login === login)) return err('Логин уже занят');
            users.push({ login, pass, name, phone, email });
            save('users', users);
            location.href = 'login.html';
        }
    </script>
</body>
</html>
