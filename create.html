<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Создать заказ</title>
</head>
<body>
    <div class="page" style="max-width: 480px;">
        <h1>Новый заказ</h1>
        <form onsubmit="createOrder(event)">
            <label>Тип</label>
            <select id="type">
                <option>Тип 1</option>
                <option>Тип 2</option>
                <option>Тип 3</option>
            </select>

            <label>Дата</label>
            <input id="date" type="date" required>

            <label>Телефон</label>
            <input id="phone" type="tel" placeholder="+7 (999) 123-45-67" required
                pattern="(\+7|8)[\s\-]?\(?\d{3}\)?[\s\-]?\d{3}[\s\-]?\d{2}[\s\-]?\d{2}">

            <label>Оплата</label>
            <select id="payment">
                <option>Наличные</option>
                <option>Перевод</option>
            </select>

            <div class="page-actions" style="margin-top: 8px;">
                <button type="submit">Отправить</button>
                <button type="button" class="btn-gray" onclick="location.href='orders.html'">Назад</button>
            </div>
        </form>
    </div>

    <script>
        const session = JSON.parse(localStorage.getItem('session'));
        if (!session || !session.loggedIn) location.href = 'login.html';

        const g = id => document.getElementById(id).value.trim();
        const load = k => JSON.parse(localStorage.getItem(k)) || [];
        const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

        function createOrder(e) {
            e.preventDefault();
            const type = g('type'), date = g('date'), phone = g('phone'), payment = g('payment');
            const orders = load('orders');
            orders.push({ id: Date.now(), user: session.login, type, date, phone, payment, status: 'Новый' });
            save('orders', orders);
            location.href = 'orders.html';
        }
    </script>
</body>
</html>
